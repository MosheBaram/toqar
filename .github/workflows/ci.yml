name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Workspace packages resolve each other's types from dist/ — build
      # topologically before typechecking dependents.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Anti-slop check
        run: ./scripts/anti-slop-check.sh
      - name: Contributor-docs drift check
        run: node scripts/check-contributor-docs.mjs
