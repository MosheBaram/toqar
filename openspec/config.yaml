schema: spec-driven

context: |
  Product: Toqar — agentic product analytics ("Mixpanel for the agentic world").
  The TOQAR metrics framework (Task success, Operational efficiency, Quality,
  Autonomy, Retention) doubles as the brand.
  Strategic brief: new-repo-handoff/KICKOFF-PROMPT.md (read it before proposing changes).
  PLAN OF RECORD: docs/roadmap.md — the gated phase plan. Phase 1 is built and
  archived; Phase 2 (experiment-plane, go-to-market-surface) is fully specced
  in openspec/changes/ as of 2026-07-10 but execution is GATED by G2 — do not
  implement Phase 2 until validation opens the gate. Gate history and
  amendments live in the roadmap's amendment log.
  Phase 0 implementation source: new-repo-handoff/plans/2026-07-07-phase-0-validation-toolkit.md.
  Tech stack: TypeScript 5.x strict, pnpm workspaces, Zod 3, vitest 2, Node >= 20.
  Package scope: @toqar/*. Event and property names are snake_case.
  Hard constraints (from the aialytics autopsy):
  - No fake data in product code (Math.random, hardcoded metrics, mocks) outside *.test.ts.
  - Docs claim only implemented, verified behavior.
  - Every commit typechecks and passes tests; TDD for logic code.
  - No new packages/services until validation reads green; depth before breadth.
  - Event payloads never carry raw user content or PII; use *_ref pointers.
  We use conventional commits.

