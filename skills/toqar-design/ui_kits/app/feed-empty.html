<body data-theme="light">
<div id="root"></div>
<script type="text/babel" src="./appshell.jsx"></script>
<script type="text/babel">
  const { EventChip } = window.ToqarDesignSystem_9aa7e3;
  const { AppShell } = window;

  function EmptyFeed() {
    const row = { display: "flex", alignItems: "center", gap: "8px", fontFamily: "var(--font-mono)", fontSize: "var(--fs-small)" };
    const doneSq = { width: "10px", height: "10px", borderRadius: "2px", background: "var(--success)", flex: "none" };
    const pendSq = { width: "10px", height: "10px", borderRadius: "2px", border: "1.5px solid var(--border-strong)", flex: "none" };
    return (
      <AppShell active="Feed" maxWidth={620}>
        <div style={{ marginTop: "48px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: "var(--radius-md)", padding: "28px 28px 24px", display: "flex", flexDirection: "column", gap: "16px" }}>
          <h2 style={{ margin: 0, fontSize: "var(--fs-h3)", fontWeight: 600, letterSpacing: "-0.01em" }}>No findings yet.</h2>
          <p style={{ margin: 0, fontSize: "var(--fs-body)", lineHeight: 1.55, color: "var(--text-muted)" }}>
            That's expected. The analysis agent needs enough runs to say something it can defend — it won't post a finding it can't trace to a query.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: "9px", padding: "14px", background: "var(--surface-sunken)", border: "1px solid var(--border-subtle)", borderRadius: "var(--radius-sm)" }}>

            <div style={row}><span style={doneSq} /><span style={{ color: "var(--text)" }}>registry synced</span><span style={{ color: "var(--text-subtle)" }}>· 14 events active</span></div>
            <div style={row}><span style={pendSq} /><span style={{ color: "var(--text-muted)" }}>first sweep</span><span style={{ color: "var(--text-subtle)" }}>· runs at the 6h mark (in 3h 41m)</span></div>
          </div>
          <p style={{ margin: 0, fontSize: "var(--fs-small)", lineHeight: 1.55, color: "var(--text-subtle)" }}>
            While you wait: events like <EventChip name="task_completed" tone="quiet" /> and <EventChip name="human_takeover" tone="quiet" /> are already queryable in the registry.
          </p>
        </div>
      </AppShell>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<EmptyFeed />);
</script>
